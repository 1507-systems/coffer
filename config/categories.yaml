# categories.yaml -- Category definitions for coffer vault
# Each category maps to a vault/*.yaml file containing encrypted secrets.

categories:
  cloudflare:
    description: "Cloudflare API tokens, zone management, tunnel, Pages"
    keys:
      - dns-token
      - pages-token
      - tunnel-snai
      - access-token
      - zone-mgmt-1507systems
      - zone-mgmt-shashinka
      - zone-mgmt-hellgaskitchen

  github:
    description: "GitHub PATs, deploy keys, app credentials"
    keys: []

  home-automation:
    description: "Home Assistant, Hubitat, SwitchBot, IoT credentials"
    keys:
      - home-assistant-token
      - hubitat-token
      - switchbot-api-token
      - switchbot-api-secret
      - bs-iot

  synology:
    description: "DSM admin credentials for all NAS devices"
    keys:
      - bshacore-dsm
      - nas000-dsm
      - nas002-dsm
      - bshadev-dsm

  communications:
    description: "VoIP.ms (API, portal, SIP), email sender, BPSMail, Resend, HK email auth"
    keys:
      - voipms-api
      - voipms-portal
      - voipms-sip-asterisk
      - email-sender
      - bpsmail-icloud
      - resend-hk
      - hk-email-auth

  misc:
    description: "Zoho CRM/portal, Memory Sync, Tailscale, Proxmox, TUG BBS"
    keys:
      - zoho-crm-client-id
      - zoho-crm-client-secret
      - crm-worker-auth
      - zoho-client-portal-id
      - zoho-client-portal-secret
      - memory-sync
      - tailscale
      - proxmox-pve000
      - tug-bbs
